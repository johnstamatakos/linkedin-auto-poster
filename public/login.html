<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Vantage</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:40px;width:360px}
    h1{font-size:20px;font-weight:600;margin-bottom:8px}
    p{color:#94a3b8;font-size:14px;margin-bottom:28px}
    label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
    input{width:100%;padding:10px 14px;background:#0f1117;border:1px solid #2d3148;border-radius:8px;color:#e2e8f0;font-size:14px;margin-bottom:16px;outline:none}
    input:focus{border-color:#5865f2}
    button{width:100%;padding:11px;background:#5865f2;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
    button:hover{background:#4752c4}
    .error{color:#f87171;font-size:13px;margin-top:12px;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <h1>Vantage</h1>
    <p>Enter your password to access the approval dashboard.</p>
    <form id="form">
      <label>Password</label>
      <input type="password" id="pw" autofocus placeholder="UI password" />
      <button type="submit">Sign In</button>
      <div class="error" id="err"></div>
    </form>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: document.getElementById('pw').value }),
      });
      if (r.ok) window.location.href = '/';
      else document.getElementById('err').textContent = 'Invalid password.';
    });
  </script>
</body>
</html>
